<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 2026 學習工具組</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; background: linear-gradient(135deg, #065A82, #21295C); }

/* Login */
.login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-box { background: white; border-radius: 20px; padding: 48px 40px; width: 90%; max-width: 420px; box-shadow: 0 30px 80px rgba(0,0,0,0.3); text-align: center; animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.login-box .icon { font-size: 56px; margin-bottom: 16px; }
.login-box h1 { font-size: 22px; color: #1E293B; margin-bottom: 8px; }
.login-box p { font-size: 14px; color: #64748B; margin-bottom: 28px; line-height: 1.6; }
.login-box input { width: 100%; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; font-family: inherit; outline: none; margin-bottom: 16px; }
.login-box input:focus { border-color: #065A82; }
.login-box .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #065A82, #1C7293); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
.login-box .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(6,90,130,0.3); }
.error { color: #E8363A; font-size: 13px; margin-top: 12px; display: none; }
.error.show { display: block; animation: shake 0.4s ease; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

/* Portal */
.portal { display: none; background: #F4F7FA; min-height: 100vh; }
.portal.show { display: block; }
.portal-header { background: linear-gradient(135deg, #065A82, #21295C); padding: 28px 32px 20px; color: white; text-align: center; }
.portal-header h1 { font-size: 24px; margin-bottom: 4px; }
.portal-header p { font-size: 12px; opacity: 0.7; }

/* Filter */
.filter-bar { background: white; padding: 12px 20px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #e2e8f0; justify-content: center; flex-wrap: wrap; }
.filter-btn { padding: 6px 16px; border: 2px solid #e2e8f0; background: white; border-radius: 20px; font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.2s; white-space: nowrap; font-weight: 500; }
.filter-btn:hover { border-color: #065A82; color: #065A82; }
.filter-btn.active { background: #065A82; color: white; border-color: #065A82; }

/* Body */
.portal-body { max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }
.subject-section { margin-bottom: 28px; }
.subject-section.hidden { display: none; }
.section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid #e2e8f0; }
.section-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.section-title { font-size: 16px; font-weight: 700; color: #1E293B; }
.section-count { font-size: 11px; color: #94a3b8; background: #f1f5f9; padding: 2px 8px; border-radius: 10px; }

/* Cards */
.chapter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
.chapter-card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); text-decoration: none; color: #1E293B; transition: transform 0.2s, box-shadow 0.2s; display: block; border-left: 4px solid #065A82; position: relative; }
.chapter-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
.card-emoji { font-size: 28px; margin-bottom: 6px; }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.card-desc { font-size: 12px; color: #64748B; line-height: 1.5; }
.card-tag { display: inline-block; margin-top: 8px; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.card-grade { position: absolute; top: 12px; right: 12px; font-size: 10px; color: #94a3b8; background: #f8fafc; padding: 2px 8px; border-radius: 8px; }
.chapter-card.soon { opacity: 0.45; pointer-events: none; border-left-color: #d1d5db; }

/* Subject Colors */
[data-subject="chi"] .section-icon { background: #fef2f2; color: #b91c1c; }
[data-subject="eng"] .section-icon { background: #f5f3ff; color: #7c3aed; }
[data-subject="math"] .section-icon { background: #f0f7ff; color: #065A82; }
[data-subject="his"] .section-icon { background: #fffbeb; color: #92400e; }
[data-subject="geo"] .section-icon { background: #f0fdf4; color: #166534; }
[data-subject="civ"] .section-icon { background: #eff6ff; color: #1e40af; }
[data-subject="phy"] .section-icon { background: #ecfeff; color: #0e7490; }
[data-subject="bio"] .section-icon { background: #f0fdf4; color: #15803d; }
[data-subject="ear"] .section-icon { background: #f5f3ff; color: #6d28d9; }

.sc-chi { --border: #b91c1c; --tag-bg: #fef2f2; --tag-color: #b91c1c; }
.sc-eng { --border: #7c3aed; --tag-bg: #f5f3ff; --tag-color: #7c3aed; }
.sc-math { --border: #065A82; --tag-bg: #f0f7ff; --tag-color: #065A82; }
.sc-his { --border: #92400e; --tag-bg: #fffbeb; --tag-color: #92400e; }
.sc-geo { --border: #166534; --tag-bg: #f0fdf4; --tag-color: #166534; }
.sc-civ { --border: #1e40af; --tag-bg: #eff6ff; --tag-color: #1e40af; }
.sc-phy { --border: #0e7490; --tag-bg: #ecfeff; --tag-color: #0e7490; }
.sc-bio { --border: #15803d; --tag-bg: #f0fdf4; --tag-color: #15803d; }
.sc-ear { --border: #6d28d9; --tag-bg: #f5f3ff; --tag-color: #6d28d9; }

.footer { text-align: center; padding: 20px; font-size: 11px; color: #94a3b8; }

@media (max-width: 768px) {
  .portal-header { padding: 20px 16px 14px; }
  .portal-header h1 { font-size: 20px; }
  .portal-body { padding: 16px 12px 40px; }
  .filter-bar { padding: 8px 12px; }
  .filter-btn { font-size: 12px; padding: 5px 12px; }
  .chapter-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Login -->
<div class="login-container" id="loginScreen">
  <div class="login-box">
    <div class="icon">📚</div>
    <h1>2026 學習工具組</h1>
    <p>請輸入密碼進入學習平台</p>
    <input type="password" id="pwInput" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">🔓 解鎖進入</button>
    <div class="error" id="errorMsg">❌ 密碼錯誤，請重新輸入</div>
  </div>
</div>

<!-- Portal -->
<div class="portal" id="portal">
  <div class="portal-header">
    <h1>📚 2026 學習工具組</h1>
    <p>June & Isabelle 的專屬學習平台 ｜ 選擇章節開始學習</p>
  </div>
  
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterSubject('all')">全部</button>
    <button class="filter-btn" onclick="filterSubject('chi')">📕 國文</button>
    <button class="filter-btn" onclick="filterSubject('eng')">📖 英文</button>
    <button class="filter-btn" onclick="filterSubject('math')">📐 數學</button>
    <button class="filter-btn" onclick="filterSubject('his')">🏛️ 歷史</button>
    <button class="filter-btn" onclick="filterSubject('geo')">🗺️ 地理</button>
    <button class="filter-btn" onclick="filterSubject('civ')">⚖️ 公民</button>
    <button class="filter-btn" onclick="filterSubject('phy')">🔬 理化</button>
    <button class="filter-btn" onclick="filterSubject('bio')">🧬 生物</button>
    <button class="filter-btn" onclick="filterSubject('ear')">🌍 地球科學</button>
  </div>
  
  <div class="portal-body" id="portalBody">
    <!-- 由 JavaScript 自動產生 -->
    <div style="text-align:center; padding:40px; color:#94a3b8;">載入中...</div>
  </div>
  
  <div class="footer">2026 學習工具組 ｜ 有問題請聯繫老師/家長</div>
</div>

<script>
// === Auth ===
async function sha256(msg) {
  const buf = new TextEncoder().encode(msg);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}
const PW_HASH = 'b3282a2f2a28757b3a18ab833de16a9c54518c0b0cf493e3f0a7cf09386f326a';

async function doLogin() {
  const pw = document.getElementById('pwInput').value.trim();
  if (!pw) return;
  const hash = await sha256(pw);
  if (hash === PW_HASH) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('portal').classList.add('show');
    sessionStorage.setItem('auth2026', '1');
    loadChapters();
  } else {
    const err = document.getElementById('errorMsg');
    err.classList.remove('show');
    void err.offsetWidth;
    err.classList.add('show');
    document.getElementById('pwInput').select();
  }
}

if (sessionStorage.getItem('auth2026') === '1') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('portal').classList.add('show');
  loadChapters();
}
document.getElementById('pwInput').focus();

// === Subject Config ===
const SUBJECTS = [
  { code: 'chi', name: '國文', emoji: '📕' },
  { code: 'eng', name: '英文', emoji: '📖' },
  { code: 'math', name: '數學', emoji: '📐' },
  { code: 'his', name: '歷史', emoji: '🏛️' },
  { code: 'geo', name: '地理', emoji: '🗺️' },
  { code: 'civ', name: '公民', emoji: '⚖️' },
  { code: 'phy', name: '理化', emoji: '🔬' },
  { code: 'bio', name: '生物', emoji: '🧬' },
  { code: 'ear', name: '地球科學', emoji: '🌍' }
];

// === Load chapters.json and render ===
async function loadChapters() {
  let chapters = [];
  try {
    const res = await fetch('chapters.json?' + Date.now());
    chapters = await res.json();
  } catch(e) {
    console.log('No chapters.json found or error loading:', e);
  }
  renderPortal(chapters);
}

function renderPortal(chapters) {
  const body = document.getElementById('portalBody');
  let html = '';
  
  for (const subj of SUBJECTS) {
    const subjChapters = chapters.filter(c => c.subject === subj.code);
    const count = subjChapters.length > 0 ? subjChapters.length + ' 個章節' : '即將新增';
    
    html += `
    <div class="subject-section" data-subject="${subj.code}">
      <div class="section-header">
        <div class="section-icon">${subj.emoji}</div>
        <div class="section-title">${subj.name}</div>
        <span class="section-count">${count}</span>
      </div>
      <div class="chapter-grid">`;
    
    if (subjChapters.length > 0) {
      for (const ch of subjChapters) {
        const isReview = ch.folder.includes('段考複習');
        const borderStyle = isReview ? 'style="border-left-color:#F59E0B;"' : '';
        const tagStyle = isReview 
          ? 'style="background:#fffbeb; color:#F59E0B;"' 
          : `style="background:var(--tag-bg); color:var(--tag-color);"`;
        const tagText = isReview ? '📝 總複習' : '7 份學習工具';
        
        html += `
        <a class="chapter-card sc-${subj.code}" href="${encodeURI(ch.folder)}/index.html" ${borderStyle}>
          <span class="card-grade">${ch.grade}</span>
          <div class="card-emoji">${ch.emoji || subj.emoji}</div>
          <div class="card-title">${ch.title}</div>
          <div class="card-desc">${ch.desc}</div>
          <span class="card-tag" ${tagStyle}>${tagText}</span>
        </a>`;
      }
    } else {
      html += `
        <div class="chapter-card soon">
          <div class="card-emoji">🔜</div>
          <div class="card-title">即將新增</div>
          <div class="card-desc">上傳教材後自動產生</div>
          <span class="card-tag" style="background:#f1f5f9; color:#94a3b8;">敬請期待</span>
        </div>`;
    }
    
    html += `</div></div>`;
  }
  
  body.innerHTML = html;
}

// === Filter ===
function filterSubject(subject) {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.remove('active');
    const name = SUBJECTS.find(s => s.code === subject)?.name;
    if (btn.textContent.includes(name) || (subject === 'all' && btn.textContent === '全部')) {
      btn.classList.add('active');
    }
  });
  document.querySelectorAll('.subject-section').forEach(sec => {
    if (subject === 'all') sec.classList.remove('hidden');
    else sec.classList.toggle('hidden', sec.dataset.subject !== subject);
  });
}
</script>

</body>
</html>
