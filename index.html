<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 第三章 幾何與證明 — 學習工具組</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: linear-gradient(135deg, #065A82, #21295C);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-container {
  background: white;
  border-radius: 20px;
  padding: 48px 40px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.3);
  text-align: center;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-icon {
  font-size: 56px;
  margin-bottom: 16px;
}

.login-container h1 {
  font-size: 22px;
  color: #1E293B;
  margin-bottom: 8px;
}

.login-container p {
  font-size: 14px;
  color: #64748B;
  margin-bottom: 28px;
  line-height: 1.6;
}

.input-group {
  position: relative;
  margin-bottom: 20px;
}

.input-group input {
  width: 100%;
  padding: 14px 48px 14px 18px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}

.input-group input:focus {
  border-color: #065A82;
}

.input-group .toggle-pw {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: #94a3b8;
}

.login-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #065A82, #1C7293);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(6,90,130,0.3);
}

.login-btn:active {
  transform: translateY(0);
}

.error-msg {
  color: #E8363A;
  font-size: 13px;
  margin-top: 12px;
  display: none;
}

.error-msg.show {
  display: block;
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

.footer-text {
  font-size: 11px;
  color: #94a3b8;
  margin-top: 20px;
}

/* Loading spinner */
.loading {
  display: none;
  margin: 20px auto;
}
.loading.show {
  display: block;
}
.spinner {
  width: 36px;
  height: 36px;
  border: 4px solid #e2e8f0;
  border-top-color: #065A82;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="login-container" id="loginBox">
  <div class="login-icon">📐</div>
  <h1>第三章 幾何與證明 — 學習工具組</h1>
  <p>此頁面需要密碼才能存取<br>請輸入老師/家長提供的密碼</p>
  
  <div class="input-group">
    <input type="password" id="pwInput" placeholder="請輸入密碼" 
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="toggle-pw" onclick="togglePassword()" id="toggleBtn">👁️</button>
  </div>
  
  <button class="login-btn" onclick="doLogin()">🔓 解鎖進入</button>
  
  <div class="error-msg" id="errorMsg">❌ 密碼錯誤，請重新輸入</div>
  
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="font-size:13px; color:#64748B; margin-top:8px;">載入中...</p>
  </div>
  
  <p class="footer-text">第三章 幾何與證明 ｜ 九年級數學</p>
</div>

// SHA-256 hash function
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function togglePassword() {
  const input = document.getElementById('pwInput');
  const btn = document.getElementById('toggleBtn');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁️';
  }
}

async function doLogin() {
  const pw = document.getElementById('pwInput').value.trim();
  if (!pw) return;
  
  const hash = await sha256(pw);
  
  if (hash === PW_HASH) {
    // Correct password
    document.getElementById('errorMsg').classList.remove('show');
    document.getElementById('loginBox').querySelector('.login-btn').style.display = 'none';
    document.getElementById('loading').classList.add('show');
    
    // Decode and render
    setTimeout(() => {
      try {
        const decoded = b64DecodeUnicode(ENCODED);
        // Replace entire page
        document.open();
        document.write(decoded);
        document.close();
        
        // Save session (optional - so they don't need to re-enter on refresh)
        try { sessionStorage.setItem('auth', '1'); } catch(e) {}
      } catch (e) {
        alert('解碼失敗：' + e.message);
      }
    }, 500);
  } else {
    // Wrong password
    const errEl = document.getElementById('errorMsg');
    errEl.classList.remove('show');
    void errEl.offsetWidth; // force reflow for animation
    errEl.classList.add('show');
    document.getElementById('pwInput').select();
  }
}

// Auto-login if session is valid
(async () => {
  try {
    if (sessionStorage.getItem('auth') === '1') {
      const decoded = b64DecodeUnicode(ENCODED);
      document.open();
      document.write(decoded);
      document.close();
    }
  } catch(e) {}
})();

// Focus password input
document.getElementById('pwInput').focus();
